<script>
const mu = 13/8;

const sigma = {
  inner: 1,
  middle: -1,
  outer: 1
};

const P_outer = 365.25625;
const P_inner = P_outer / mu;
const P_middle = (P_inner + P_outer) / 2;

const C = 250;
const R = { inner: 80, middle: 140, outer: 200 };

let t = 0;

function frame() {
  t++;

  const k = 0.2;

  // PURE PHASE MAP (no reinterpretation)
  const θi = (360 / P_inner) * (k * t);
  const θm = (360 / P_middle) * (k * t);
  const θo = (360 / P_outer) * (k * t);

  const inner = document.getElementById("inner");
  const middle = document.getElementById("middle");
  const outer = document.getElementById("outer");

  inner.setAttribute("transform",
    `translate(${C + R.inner * Math.sin(θi * Math.PI / 180)},
               ${C - R.inner * Math.cos(θi * Math.PI / 180)})`
  );

  middle.setAttribute("transform",
    `translate(${C + R.middle * Math.sin(θm * Math.PI / 180)},
               ${C - R.middle * Math.cos(θm * Math.PI / 180)})
     rotate(${sigma.middle * θm})`
  );

  outer.setAttribute("transform",
    `translate(${C + R.outer * Math.sin(θo * Math.PI / 180)},
               ${C - R.outer * Math.cos(θo * Math.PI / 180)})`
  );

  requestAnimationFrame(frame);
}

requestAnimationFrame(frame);
</script>
